<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Let's Go Bonecar</title>
  <link href="https://fonts.googleapis.com/css2?family=Pacifico&family=Nunito:wght@400;600;700&display=swap" rel="stylesheet"/>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Nunito', sans-serif;
      background-color: #fff0f6;
      color: #4a4a4a;
    }

    header {
      background-color: #ff3daa;
      color: white;
      text-align: center;
      padding: 30px 20px 20px;
    }

    header .heart { font-size: 2.5rem; }

    header h1 {
      font-family: 'Pacifico', cursive;
      font-size: 2.2rem;
      margin: 8px 0 4px;
    }

    header .sub {
      font-size: 0.85rem;
      opacity: 0.9;
      margin-bottom: 12px;
    }

    header .contatos {
      display: flex;
      justify-content: center;
      gap: 20px;
      flex-wrap: wrap;
      font-size: 0.9rem;
    }

    header .contatos a {
      color: white;
      text-decoration: none;
      background: rgba(255,255,255,0.2);
      padding: 6px 14px;
      border-radius: 20px;
      transition: background 0.2s;
    }

    header .contatos a:hover { background: rgba(255,255,255,0.35); }

    .tabs {
      display: flex;
      justify-content: center;
      gap: 10px;
      padding: 24px 20px 0;
    }

    .tab-btn {
      background: white;
      border: 2px solid #ff3daa;
      color: #ff3daa;
      padding: 10px 28px;
      border-radius: 30px;
      font-family: 'Nunito', sans-serif;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.2s;
    }

    .tab-btn.active, .tab-btn:hover {
      background: #ff3daa;
      color: white;
    }

    .grid-section {
      display: none;
      padding: 24px 20px 40px;
      max-width: 1100px;
      margin: 0 auto;
    }

    .grid-section.active { display: block; }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
      gap: 24px;
    }

    .card {
      background: white;
      border-radius: 20px;
      overflow: hidden;
      box-shadow: 0 4px 16px rgba(255, 61, 170, 0.12);
      transition: transform 0.2s;
    }

    .card:hover { transform: translateY(-4px); }

    .card img {
      width: 100%;
      height: 260px;
      object-fit: cover;
    }

    .card-body { padding: 16px; }

    .card-id {
      font-size: 0.75rem;
      color: #ff3daa;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .card-desc {
      font-size: 0.9rem;
      margin: 6px 0 10px;
      color: #666;
      line-height: 1.4;
    }

    .card-price {
      font-size: 1.15rem;
      font-weight: 700;
      color: #ff3daa;
      margin-bottom: 12px;
    }

    .btn-adotar {
      display: block;
      width: 100%;
      background: #ff3daa;
      color: white;
      border: none;
      border-radius: 30px;
      padding: 10px;
      font-family: 'Nunito', sans-serif;
      font-size: 0.95rem;
      font-weight: 700;
      cursor: pointer;
      text-align: center;
      text-decoration: none;
      transition: background 0.2s;
    }

    .btn-adotar:hover { background: #e0008f; }

    .card.adotada { opacity: 0.75; }
    .card.adotada img { filter: grayscale(30%); }

    .badge-adotada {
      display: inline-block;
      background: #ccc;
      color: white;
      border-radius: 20px;
      padding: 8px;
      font-size: 0.85rem;
      font-weight: 700;
      width: 100%;
      text-align: center;
    }

    .msg {
      text-align: center;
      color: #aaa;
      padding: 40px;
      font-size: 1rem;
    }

    footer {
      background: #ff3daa;
      color: white;
      text-align: center;
      padding: 18px;
      font-size: 0.85rem;
    }
  </style>
</head>
<body>

<header>
  <div class="heart">🤍</div>
  <h1>Let's Go Bonecar</h1>
  <p class="sub">Bonecas de Pano · Jundiaí/SP · Brasil</p>
  <div class="contatos">
    <a href="https://wa.me/5511998585971" target="_blank">📱 (11) 99858-5971</a>
    <a href="https://instagram.com/letsgobonecar" target="_blank">📸 @letsgobonecar</a>
  </div>
</header>

<div class="tabs">
  <button class="tab-btn active" onclick="mostrarAba('disponiveis', this)">💕 Disponíveis</button>
  <button class="tab-btn" onclick="mostrarAba('adotadas', this)">🏠 Já Adotadas</button>
</div>

<section id="disponiveis" class="grid-section active">
  <div class="grid" id="grid-disponiveis">
    <p class="msg">Carregando bonequinhas... 🎀</p>
  </div>
</section>

<section id="adotadas" class="grid-section">
  <div class="grid" id="grid-adotadas">
    <p class="msg">Carregando galeria... 🎀</p>
  </div>
</section>

<footer>
  Feito com 💕 · Let's Go Bonecar · Jundiaí/SP
</footer>

<script>
  const SHEET_ID = '1tNdlvCXUratik2sDl4wPPpJnQPWEXTCaFuhK-3RxnGA';
  const WPP = '5511998585971';

  // Usa a API gviz do Google — sem CORS, sem proxy!
  const GVIZ_URL = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json`;

  function mostrarAba(id, btn) {
    document.querySelectorAll('.grid-section').forEach(s => s.classList.remove('active'));
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    document.getElementById(id).classList.add('active');
    btn.classList.add('active');
  }

  function cardDisponivel(b) {
    return `
      <div class="card">
        <img src="${b.foto}" alt="Boneca ${b.id}" onerror="this.src='https://placehold.co/400x300/ffb6d9/fff?text=🎀'"/>
        <div class="card-body">
          <div class="card-id">Boneca #${b.id}</div>
          <p class="card-desc">${b.descricao}</p>
          <div class="card-price">${b.preco}</div>
          <a class="btn-adotar"
             href="https://wa.me/${WPP}?text=Olá!%20Tenho%20interesse%20na%20Boneca%20%23${b.id}%20😍"
             target="_blank">Quero adotar! 💕</a>
        </div>
      </div>`;
  }

  function cardAdotada(b) {
    return `
      <div class="card adotada">
        <img src="${b.foto}" alt="Boneca ${b.id}" onerror="this.src='https://placehold.co/400x300/ddd/fff?text=🎀'"/>
        <div class="card-body">
          <div class="card-id">Boneca #${b.id}</div>
          <p class="card-desc">${b.descricao}</p>
          <span class="badge-adotada">🏠 Já adotada com muito amor!</span>
        </div>
      </div>`;
  }

  fetch(GVIZ_URL)
    .then(r => r.text())
    .then(text => {
      // A resposta vem como: google.visualization.Query.setResponse({...})
      const json = JSON.parse(text.match(/google\.visualization\.Query\.setResponse\(([\s\S]*)\)/)[1]);
      const rows = json.table.rows;

      const bonecas = rows.map(row => ({
        id:        row.c[0]?.v ?? '',
        status:    String(row.c[1]?.v ?? '').toLowerCase().trim(),
        preco:     row.c[2]?.v ?? '',
        descricao: row.c[3]?.v ?? '',
        foto:      row.c[4]?.v ?? ''
      }));

      const disponiveis = bonecas.filter(b => b.status === 'disponivel');
      const adotadas    = bonecas.filter(b => b.status === 'adotada');

      document.getElementById('grid-disponiveis').innerHTML =
        disponiveis.length
          ? disponiveis.map(cardDisponivel).join('')
          : '<p class="msg">Nenhuma bonequinha disponível no momento. Em breve novidades! 🎀</p>';

      document.getElementById('grid-adotadas').innerHTML =
        adotadas.length
          ? adotadas.map(cardAdotada).join('')
          : '<p class="msg">Galeria vazia por enquanto. 🎀</p>';
    })
    .catch(() => {
      document.getElementById('grid-disponiveis').innerHTML =
        '<p class="msg">Erro ao carregar. Verifique se a planilha está publicada. 🎀</p>';
      document.getElementById('grid-adotadas').innerHTML =
        '<p class="msg">Erro ao carregar. 🎀</p>';
    });
</script>

</body>
</html>
