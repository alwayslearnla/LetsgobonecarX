<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Catálogo</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: Arial, sans-serif; background: #f5f5f5; padding: 20px; }
    h1 { text-align: center; margin-bottom: 20px; color: #333; }

    #filtros {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      justify-content: center;
      margin-bottom: 20px;
    }
    #filtros input, #filtros select {
      padding: 8px 12px;
      border: 1px solid #ccc;
      border-radius: 6px;
      font-size: 14px;
    }

    #catalogo {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 20px;
    }

    .card {
      background: #fff;
      border-radius: 10px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
      overflow: hidden;
      transition: transform 0.2s;
    }
    .card:hover { transform: translateY(-4px); }

    .card img {
      width: 100%;
      height: 220px;
      object-fit: cover;
      display: block;
      background: #eee;
    }

    .card-info {
      padding: 12px;
    }
    .card-info h3 { font-size: 15px; color: #222; margin-bottom: 6px; }
    .card-info p  { font-size: 13px; color: #666; margin-bottom: 4px; }
    .card-info .preco {
      font-size: 16px;
      font-weight: bold;
      color: #e44d26;
      margin-top: 6px;
    }

    #loading { text-align: center; font-size: 16px; color: #999; margin: 40px 0; }
    #erro    { text-align: center; color: red; margin: 20px; }
  </style>
</head>
<body>

<h1>📦 Catálogo de Produtos</h1>

<div id="filtros">
  <input type="text" id="busca" placeholder="🔍 Buscar produto..." oninput="filtrar()" />
  <select id="categoria" onchange="filtrar()">
    <option value="">Todas as categorias</option>
  </select>
</div>

<div id="loading">Carregando produtos...</div>
<div id="erro" style="display:none;"></div>
<div id="catalogo"></div>

<script>
  const SHEET_ID = '1tNdlvCXUratik2sDl4wPPpJnQPWEXTCaFuhK-3RxnGA';
  const URL = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json`;

  let todosProdutos = [];

  function extrairIdDrive(link) {
    if (!link) return null;
    // Formato: /file/d/ID/view
    let match = link.match(/\/d\/([a-zA-Z0-9_-]+)/);
    if (match) return match[1];
    // Formato: ?id=ID ou &id=ID
    match = link.match(/[?&]id=([a-zA-Z0-9_-]+)/);
    if (match) return match[1];
    return null;
  }

  function extrairFoto(colunaE, colunaF) {
    // Tenta coluna F primeiro, depois coluna E
    const id = extrairIdDrive(colunaF) || extrairIdDrive(colunaE);
    if (id) {
      return `https://drive.google.com/thumbnail?id=${id}&sz=w400`;
    }
    return 'https://via.placeholder.com/400x220?text=Sem+Foto';
  }

  function formatarPreco(valor) {
    if (!valor && valor !== 0) return 'Sob consulta';
    return 'R$ ' + parseFloat(valor).toFixed(2).replace('.', ',');
  }

  fetch(URL)
    .then(r => r.text())
    .then(text => {
      const json = JSON.parse(text.match(/google\.visualization\.Query\.setResponse\(([\s\S]*?)\);/)[1]);
      const rows  = json.table.rows;
      const cols  = json.table.cols;

      // Detecta índices pelas colunas (A=0, B=1, C=2, D=3, E=4, F=5...)
      // Ajuste os índices abaixo conforme seu cabeçalho real
      const IDX = {
        nome:      0, // coluna A
        descricao: 1, // coluna B
        categoria: 2, // coluna C
        preco:     3, // coluna D
        fotoE:     4, // coluna E — link /file/d/ID/view
        fotoF:     5, // coluna F — link uc?export=view&id=ID
      };

      todosProdutos = rows
        .filter(r => r.c[IDX.nome] && r.c[IDX.nome].v)
        .map(r => ({
          nome:      r.c[IDX.nome]?.v      || '',
          descricao: r.c[IDX.descricao]?.v || '',
          categoria: r.c[IDX.categoria]?.v || '',
          preco:     r.c[IDX.preco]?.v,
          foto:      extrairFoto(r.c[IDX.fotoE]?.v, r.c[IDX.fotoF]?.v),
        }));

      // Popula filtro de categorias
      const categorias = [...new Set(todosProdutos.map(p => p.categoria).filter(Boolean))].sort();
      const sel = document.getElementById('categoria');
      categorias.forEach(cat => {
        const opt = document.createElement('option');
        opt.value = cat;
        opt.textContent = cat;
        sel.appendChild(opt);
      });

      document.getElementById('loading').style.display = 'none';
      renderizar(todosProdutos);
    })
    .catch(err => {
      document.getElementById('loading').style.display = 'none';
      const erroEl = document.getElementById('erro');
      erroEl.style.display = 'block';
      erroEl.textContent = 'Erro ao carregar dados: ' + err.message;
    });

  function renderizar(lista) {
    const catalogo = document.getElementById('catalogo');
    catalogo.innerHTML = '';

    if (lista.length === 0) {
      catalogo.innerHTML = '<p style="text-align:center;color:#999;grid-column:1/-1">Nenhum produto encontrado.</p>';
      return;
    }

    lista.forEach(p => {
      const card = document.createElement('div');
      card.className = 'card';
      card.innerHTML = `
        <img src="${p.foto}" alt="${p.nome}" loading="lazy"
             onerror="this.src='https://via.placeholder.com/400x220?text=Sem+Foto'" />
        <div class="card-info">
          <h3>${p.nome}</h3>
          ${p.categoria ? `<p>📁 ${p.categoria}</p>` : ''}
          ${p.descricao ? `<p>${p.descricao}</p>` : ''}
          <div class="preco">${formatarPreco(p.preco)}</div>
        </div>
      `;
      catalogo.appendChild(card);
    });
  }

  function filtrar() {
    const busca     = document.getElementById('busca').value.toLowerCase();
    const categoria = document.getElementById('categoria').value;
    const resultado = todosProdutos.filter(p => {
      const matchBusca = p.nome.toLowerCase().includes(busca) || p.descricao.toLowerCase().includes(busca);
      const matchCat   = !categoria || p.categoria === categoria;
      return matchBusca && matchCat;
    });
    renderizar(resultado);
  }
</script>

</body>
</html>
